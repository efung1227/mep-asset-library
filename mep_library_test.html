<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MEP Asset Library — Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#070910;--sur:#0e1013;--bdr:#2a3040;--pri:#ff9100;--tx:#e2e2e6;--tx2:#9ca3af;--tx3:#6b7280;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Space Grotesk',monospace;display:flex;flex-direction:column;}
#header{padding:14px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.logo{font-size:13px;font-weight:700;color:var(--tx);letter-spacing:.05em;}
.sub{font-size:10px;color:var(--tx3);}
#body{display:flex;flex:1;overflow:hidden;}
#sidebar{width:220px;border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;}
#sidebar-header{padding:10px 14px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--tx3);border-bottom:1px solid var(--bdr);}
#fixture-list{flex:1;overflow-y:auto;}
.fixture-item{padding:10px 14px;cursor:pointer;border-left:2px solid transparent;display:flex;flex-direction:column;gap:3px;border-bottom:1px solid #0d1117;}
.fixture-item:hover{background:var(--sur);}
.fixture-item.active{border-left-color:var(--pri);background:var(--sur);}
.fix-name{font-size:12px;color:var(--tx);}
.fix-meta{font-size:10px;color:var(--tx3);}
.fix-status{font-size:9px;padding:1px 6px;border-radius:2px;display:inline-block;margin-top:2px;}
.fix-status.loaded{background:#0d2010;color:#4ade80;}
.fix-status.loading{background:#1a1400;color:#fbbf24;}
.fix-status.error{background:#1a0d0d;color:#f87171;}
#viewport{flex:1;position:relative;overflow:hidden;}
canvas{display:block;width:100%!important;height:100%!important;}
#info-panel{position:absolute;bottom:0;left:0;right:0;padding:12px 16px;background:rgba(7,9,16,.85);border-top:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
.info-name{font-size:13px;font-weight:700;color:var(--tx);}
.info-sub{font-size:10px;color:var(--tx3);margin-top:2px;}
.place-btn{font-size:11px;padding:6px 16px;border-radius:3px;border:1px solid var(--pri);background:transparent;color:var(--pri);cursor:pointer;letter-spacing:.05em;}
.place-btn:hover{background:var(--pri);color:#000;}
#log{position:absolute;top:10px;right:10px;font-size:9px;color:var(--tx3);text-align:right;pointer-events:none;}
#hint{position:absolute;top:10px;left:10px;font-size:9px;color:var(--tx3);pointer-events:none;}
#loading-overlay{position:absolute;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:5;transition:opacity .4s;}
#loading-overlay.done{opacity:0;pointer-events:none;}
.spin{width:24px;height:24px;border:2px solid var(--bdr);border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-lbl{font-size:10px;color:var(--tx3);letter-spacing:.1em;text-transform:uppercase;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="header">
  <div>
    <div class="logo">MEP Asset Library</div>
    <div class="sub">efung1227/mep-asset-library · GitHub</div>
  </div>
</div>
<div id="body">
  <div id="sidebar">
    <div id="sidebar-header">Fixtures</div>
    <div id="fixture-list"></div>
  </div>
  <div id="viewport">
    <div id="loading-overlay"><div class="spin"></div><div class="spin-lbl" id="load-msg">Fetching manifest…</div></div>
    <canvas id="c"></canvas>
    <div id="hint">Drag to rotate · Scroll to zoom</div>
    <div id="log"></div>
    <div id="info-panel" style="display:none;">
      <div><div class="info-name" id="info-name"></div><div class="info-sub" id="info-sub"></div></div>
      <button class="place-btn">Place on wall</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const ASSET_BASE = 'https://raw.githubusercontent.com/efung1227/mep-asset-library/main/';

// ── Three.js setup ──
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.5;
renderer.shadowMap.enabled = true;
renderer.setSize(canvas.parentElement.clientWidth, canvas.parentElement.clientHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x070910);

const camera = new THREE.PerspectiveCamera(45, canvas.parentElement.clientWidth/canvas.parentElement.clientHeight, 0.01, 10000);
camera.position.set(0,0,200);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const key = new THREE.DirectionalLight(0xfff8f0, 2.0);
key.position.set(200,300,200); key.castShadow=true; scene.add(key);
const fill = new THREE.DirectionalLight(0xc8d8ff, 0.7);
fill.position.set(-200,100,-100); scene.add(fill);
const rim = new THREE.DirectionalLight(0xff9100, 0.4);
rim.position.set(0,-200,150); scene.add(rim);
const grid = new THREE.GridHelper(2000,40,0x1a1c1f,0x111316);
scene.add(grid);

// ── GLB parser (handles interleaved byteStride) ──
function parseGLB(buffer){
  const dv = new DataView(buffer);
  const jsonLen = dv.getUint32(12,true);
  const json = JSON.parse(new TextDecoder().decode(new Uint8Array(buffer,20,jsonLen)));
  const bin = buffer.slice(20+jsonLen+8);
  const accs=json.accessors||[], bvs=json.bufferViews||[], mats=json.materials||[];

  function readAcc(idx){
    const a=accs[idx], bv=bvs[a.bufferView];
    const C={5120:Int8Array,5121:Uint8Array,5122:Int16Array,5123:Uint16Array,5125:Uint32Array,5126:Float32Array}[a.componentType];
    const n={SCALAR:1,VEC2:2,VEC3:3,VEC4:4}[a.type];
    const count=a.count;
    const bvOff=bv.byteOffset||0, aOff=a.byteOffset||0;
    const stride=bv.byteStride||(n*C.BYTES_PER_ELEMENT);
    if(stride===n*C.BYTES_PER_ELEMENT) return new C(bin,bvOff+aOff,count*n);
    const out=new C(count*n);
    const src=new C(bin);
    const base=(bvOff+aOff)/C.BYTES_PER_ELEMENT;
    const st=stride/C.BYTES_PER_ELEMENT;
    for(let i=0;i<count;i++) for(let k=0;k<n;k++) out[i*n+k]=src[base+i*st+k];
    return out;
  }

  function makeMat(mi){
    if(mi===undefined||mi<0||mi>=mats.length)
      return new THREE.MeshStandardMaterial({color:0x999999,metalness:0.4,roughness:0.6});
    const m=mats[mi], pbr=m.pbrMetallicRoughness||{};
    const c=pbr.baseColorFactor||[0.8,0.8,0.8,1];
    return new THREE.MeshStandardMaterial({
      name:m.name||'mat'+mi,
      color:new THREE.Color(c[0],c[1],c[2]),
      metalness:pbr.metallicFactor!==undefined?pbr.metallicFactor:0.0,
      roughness:pbr.roughnessFactor!==undefined?pbr.roughnessFactor:0.8,
    });
  }

  const group=new THREE.Group();
  (json.meshes||[]).forEach(mesh=>{
    (mesh.primitives||[]).forEach(prim=>{
      try{
        const geo=new THREE.BufferGeometry();
        const pos=readAcc(prim.attributes.POSITION);
        geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(pos),3));
        if(prim.attributes.NORMAL!==undefined){
          const nor=readAcc(prim.attributes.NORMAL);
          geo.setAttribute('normal',new THREE.BufferAttribute(new Float32Array(nor),3));
        }
        if(prim.indices!==undefined){
          const idx=readAcc(prim.indices);
          geo.setIndex(new THREE.BufferAttribute(new Uint32Array(idx),1));
        }
        if(!prim.attributes.NORMAL) geo.computeVertexNormals();
        const m3=new THREE.Mesh(geo,makeMat(prim.material));
        m3.castShadow=true; m3.receiveShadow=true;
        group.add(m3);
      }catch(e){console.warn('prim err',e);}
    });
  });
  return group;
}

// ── Model cache & display ──
const cache = {};
let currentModel = null;

function showModel(group){
  if(currentModel){ scene.remove(currentModel); currentModel=null; }
  scene.add(group);
  currentModel = group;
  const box=new THREE.Box3().setFromObject(group);
  const size=box.getSize(new THREE.Vector3());
  const center=box.getCenter(new THREE.Vector3());
  group.position.sub(center);
  grid.position.y = -size.y/2;
  const maxDim=Math.max(size.x,size.y,size.z);
  radius = maxDim*2.2;
  theta=0.6; phi=1.15; panX=0; panY=0;
  updateCam();
}

async function loadFixture(item){
  setStatus(item.id,'loading');
  document.getElementById('load-msg').textContent='Fetching '+item.label+'…';
  document.getElementById('loading-overlay').classList.remove('done');

  try{
    if(cache[item.id]){
      showModel(cache[item.id].clone(true));
    } else {
      const url = ASSET_BASE+'models/'+item.glb;
      document.getElementById('log').textContent=url;
      const res = await fetch(url);
      if(!res.ok) throw new Error('HTTP '+res.status);
      const buf = await res.arrayBuffer();
      const group = parseGLB(buf);
      cache[item.id] = group;
      showModel(group.clone(true));
    }
    setStatus(item.id,'loaded');
    document.getElementById('info-name').textContent=item.label;
    document.getElementById('info-sub').textContent=item.category+' · '+item.manufacturer+(item.partNumber?' · '+item.partNumber:'');
    document.getElementById('info-panel').style.display='flex';
  }catch(e){
    setStatus(item.id,'error');
    document.getElementById('log').textContent='Error: '+e.message;
    console.error(e);
  }
  document.getElementById('loading-overlay').classList.add('done');
}

function setStatus(id, status){
  const el=document.querySelector('[data-id="'+id+'"] .fix-status');
  if(el){ el.className='fix-status '+status; el.textContent=status; }
}

// ── Manifest loader ──
async function init(){
  try{
    document.getElementById('load-msg').textContent='Fetching manifest…';
    const res = await fetch(ASSET_BASE+'manifest.json');
    if(!res.ok) throw new Error('No manifest.json yet (HTTP '+res.status+')');
    const manifest = await res.json();
    buildSidebar(manifest);
    document.getElementById('loading-overlay').classList.add('done');
    if(manifest.length>0) loadFixture(manifest[0]);
  }catch(e){
    // Fallback: use hardcoded test entry
    document.getElementById('log').textContent=e.message+' — using test entry';
    const test=[{id:'delta_r10000',label:'Delta R10000 Shower Valve',manufacturer:'Delta',partNumber:'R10000',category:'shower_valve',glb:'delta_r10000_shower_valve.glb'}];
    buildSidebar(test);
    document.getElementById('loading-overlay').classList.add('done');
    loadFixture(test[0]);
  }
}

function buildSidebar(items){
  const list=document.getElementById('fixture-list');
  list.innerHTML='';
  items.forEach((item,i)=>{
    const div=document.createElement('div');
    div.className='fixture-item'+(i===0?' active':'');
    div.dataset.id=item.id;
    div.innerHTML=`<div class="fix-name">${item.label}</div><div class="fix-meta">${item.manufacturer}${item.partNumber?' · '+item.partNumber:''}</div><div class="fix-status loading">loading</div>`;
    div.addEventListener('click',()=>{
      document.querySelectorAll('.fixture-item').forEach(x=>x.classList.remove('active'));
      div.classList.add('active');
      loadFixture(item);
    });
    list.appendChild(div);
  });
}

// ── Orbit controls ──
let drag=false,rDrag=false,lastX=0,lastY=0;
let theta=0.6,phi=1.15,radius=200,panX=0,panY=0;
function updateCam(){
  camera.position.set(panX+radius*Math.sin(phi)*Math.sin(theta),panY+radius*Math.cos(phi),radius*Math.sin(phi)*Math.cos(theta));
  camera.lookAt(panX,panY,0);
}
canvas.addEventListener('mousedown',e=>{if(e.button===2)rDrag=true;else drag=true;lastX=e.clientX;lastY=e.clientY;e.preventDefault();});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
window.addEventListener('mouseup',()=>{drag=false;rDrag=false;});
window.addEventListener('mousemove',e=>{
  const dx=e.clientX-lastX,dy=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;
  if(drag){theta-=dx*0.008;phi=Math.max(0.05,Math.min(Math.PI-0.05,phi+dy*0.008));updateCam();}
  if(rDrag){panX+=dx*0.3;panY-=dy*0.3;updateCam();}
});
canvas.addEventListener('wheel',e=>{radius=Math.max(1,radius+e.deltaY*0.3);updateCam();e.preventDefault();},{passive:false});

const vp=document.getElementById('viewport');
const ro=new ResizeObserver(()=>{
  renderer.setSize(vp.clientWidth,vp.clientHeight);
  camera.aspect=vp.clientWidth/vp.clientHeight;
  camera.updateProjectionMatrix();
});
ro.observe(vp);

(function animate(){requestAnimationFrame(animate);renderer.render(scene,camera);})();
init();
</script>
</body>
</html>
